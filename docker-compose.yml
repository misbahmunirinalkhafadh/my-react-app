version: '3.8'

services:
  # Development service
  dev:
    container_name: my-react-app-dev
    build:
      context: .
      target: builder
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_ENV=development
      - VITE_API_URL=http://localhost:3000/api
    command: npm run dev
    networks:
      - app-network

  # Production-like service (untuk testing)
  prod:
    container_name: my-react-app-prod
    build:
      context: .
      target: builder
    ports:
      - "3000:3000"
    environment:
      - VITE_ENV=production
      - VITE_API_URL=https://api.example.com/api
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

# Usage:
# 
# Development:
#   docker-compose up dev
#   Open http://localhost:5173
# 
# Production (test):
#   docker-compose up prod
#   Open http://localhost:3000
#
# Both:
#   docker-compose up
#
# Logs:
#   docker-compose logs -f [service]
#
# Stop:
#   docker-compose down
#
# Rebuild:
#   docker-compose build --no-cache
