# ==============================================================================
# CI/CD Workflow untuk React Vite App
# 
# Workflow ini di-optimize untuk project React dengan Vite:
# - Build optimization untuk Vite
# - Lint & Format checking
# - Security scanning
# - Deployment templates untuk staging & production
#
# Setup:
#   1. Customize ENV variables di bawah
#   2. Setup GitHub Secrets untuk deployment (jika diperlukan)
#   3. Uncomment deployment jobs ketika ready
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - staging
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

# Cancel running workflows when a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ==== PROJECT SETTINGS ====
  NODE_VERSION: '18'
  PROJECT_NAME: my-react-app
  # ==== APPLICATION VARIABLES ====
  VITE_APP_NAME: my-react-app
  VITE_ENV: development
  # ========================

jobs:
  # ============================================================================
  # JOB 1: CHECKOUT & SETUP
  # ============================================================================
  setup:
    name: Setup & Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit-sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for versioning

      - name: Get commit SHA
        id: commit
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: |
          VERSION=$(cat package.json | grep version | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Display environment info
        run: |
          echo "Project: ${{ env.PROJECT_NAME }}"
          echo "Commit: ${{ steps.commit.outputs.sha }}"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Event: ${{ github.event_name }}"

  # ============================================================================
  # JOB 2: BUILD
  # ============================================================================
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          echo "Dependencies installed successfully"

      - name: Build project
        run: |
          npm run build
          echo "Build completed successfully"

      - name: Generate build info
        run: |
          echo "Build Date: $(date)" > build-info.txt
          echo "Commit: ${{ needs.setup.outputs.commit-sha }}" >> build-info.txt
          echo "Version: ${{ needs.setup.outputs.version }}" >> build-info.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}
          path: |
            dist/
            build/
            build-info.txt
          retention-days: 30

      - name: Check build output
        run: |
          if [ ! -d "dist" ] && [ ! -d "build" ]; then
            echo "⚠️ Warning: No build output found"
          else
            echo "✅ Build artifacts found"
          fi

  # ============================================================================
  # JOB 3: TESTING
  # ============================================================================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        node-version: ['16', '18', '20']
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false
        continue-on-error: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && matrix.node-version == '18'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ============================================================================
  # JOB 4: CODE QUALITY
  # ============================================================================
  quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run Prettier check
        run: npm run format:check
        continue-on-error: true

      - name: SAST Analysis (if available)
        run: |
          if [ -f ".snyk" ]; then
            echo "Running Snyk security scan..."
            # npm install -g snyk
            # snyk test
          fi
        continue-on-error: true

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # ============================================================================
  # JOB 5: SECURITY SCAN
  # ============================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ============================================================================
  # JOB 6: DOCKER BUILD (Optional)
  # ============================================================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build, test, quality]
    # Only run on main branch or manual trigger
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

  # ============================================================================
  # JOB 7: DEPLOY TO STAGING
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, test, quality, security]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}

      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging..."
          echo "Version: $(cat build-info.txt | grep Version)"
          # Add your deployment commands here
          # Example:
          # scp -r build/* user@staging.example.com:/var/www/app/
          # ssh user@staging.example.com "cd /var/www/app && npm install && npm run serve"
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

      - name: Health check
        run: |
          echo "Running health checks..."
          # curl -f https://staging.example.com/health || exit 1
        continue-on-error: true

  # ============================================================================
  # JOB 8: DEPLOY TO PRODUCTION
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, test, quality, security]
    # Only deploy to production from main branch with manual approval
    if: |
      github.ref == 'refs/heads/main' && 
      github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}

      - name: Deploy to Production
        run: |
          echo "Deploying to Production..."
          echo "Version: $(cat build-info.txt | grep Version)"
          # Add your production deployment commands here
          # Example with GitHub Deployment API:
          # curl -X POST https://api.github.com/repos/${{ github.repository }}/deployments \
          #   -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          #   -d '{"ref": "${{ github.sha }}", "environment": "production"}'
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

      - name: Health check
        run: |
          echo "Running health checks..."
          # curl -f https://example.com/health || exit 1
        continue-on-error: true

  # ============================================================================
  # JOB 9: NOTIFICATIONS
  # ============================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [build, test, quality, security]
    if: always()
    steps:
      - name: Check workflow status
        run: |
          if [ "${{ needs.build.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.quality.result }}" == "failure" ]; then
            echo "::error::Pipeline has failures"
            exit 1
          fi

      - name: Send success notification
        if: success()
        run: |
          echo "✅ Pipeline completed successfully!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Send failure notification
        if: failure()
        run: |
          echo "❌ Pipeline failed!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      # Uncomment untuk Slack notifications
      # - name: Slack Notification
      #   uses: slackapi/slack-github-action@v1
      #   if: always()
      #   with:
      #     webhook-url: ${{ secrets.SLACK_WEBHOOK }}
      #     payload: |
      #       {
      #         "text": "Pipeline ${{ job.status }}: ${{ github.repository }}",
      #         "blocks": [
      #           {
      #             "type": "section",
      #             "text": {
      #               "type": "mrkdwn",
      #               "text": "*Pipeline Status*: ${{ job.status }}\n*Branch*: ${{ github.ref_name }}"
      #             }
      #           }
      #         ]
      #       }

# ==============================================================================
# End of CI/CD Template
# ==============================================================================
