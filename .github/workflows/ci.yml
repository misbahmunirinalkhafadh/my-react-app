# ==============================================================================
# CI/CD Workflow untuk React Vite App
# 
# Workflow ini di-optimize untuk project React dengan Vite:
# - Build optimization untuk Vite (output: dist/)
# - Lint & Code quality check
# - Security scanning
# - Deployment templates untuk staging & production
#
# Setup:
#   1. Push file ini ke GitHub
#   2. Customize environment variables sesuai kebutuhan
#   3. Setup GitHub Secrets untuk deployment (STAGING_HOST, PROD_HOST, dll)
#   4. Configure branches dan conditions sesuai flow Anda
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    types: [closed]
    branches:
      - staging 
      - main
  workflow_dispatch:

permissions:
  contents: write

# Cancel running workflows when a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PROJECT_NAME: ${{ github.event.repository.name }}
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}

jobs:
  # ============================================================================
  # JOB 1: SETUP & VALIDATION
  # ============================================================================
  setup:
    name: Setup & Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit-sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get commit SHA
        id: commit
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Display environment info
        run: |
          echo "✅ Project: ${{ env.PROJECT_NAME }}"
          echo "✅ Commit: ${{ steps.commit.outputs.sha }}"
          echo "✅ Version: ${{ steps.version.outputs.version }}"
          echo "✅ Branch: ${{ github.ref_name }}"
          echo "✅ Event: ${{ github.event_name }}"

  # ============================================================================
  # JOB 2: BUILD REACT VITE APP
  # ============================================================================
  build:
    name: Build Vite App
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          echo "✅ Dependencies installed"

      - name: Build with Vite
        run: |
          npm run build
          echo "✅ Build completed"

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Error: dist/ folder not found!"
            exit 1
          fi
          echo "✅ Build artifacts verified"
          echo "Build size: $(du -sh dist/ | cut -f1)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_number }}
          path: dist/
          retention-days: 30

  # ============================================================================
  # JOB 3: LINT & CODE QUALITY
  # ============================================================================
  quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Code quality summary
        run: echo "✅ Code quality check completed"

  # ============================================================================
  # JOB 4: SECURITY SCANNING
  # ============================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: NPM security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Security scan summary
        run: echo "✅ Security scanning completed"

  # ============================================================================
  # JOB 5: SEMANTIC RELEASE
  # ============================================================================
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [build, quality, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # WAJIB untuk semantic-release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # JOB 6: DOCKER BUILD & PUSH TO DOCKER HUB
  # ============================================================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build, quality, security, release]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=develop" >> $GITHUB_OUTPUT
          fi
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKER_IMAGE }}:v${{ steps.tag.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:${{ steps.tag.outputs.commit }}
          labels: |
            org.opencontainers.image.title=${{ env.PROJECT_NAME }}
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}
            org.opencontainers.image.revision=${{ steps.tag.outputs.commit }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker build summary
        run: |
          echo "📦 Docker Image Built & Pushed Successfully"
          echo "Repository: ${{ env.DOCKER_IMAGE }}"
          echo "Tags:"
          echo "  - ${{ steps.tag.outputs.tag }}"
          echo "  - v${{ steps.tag.outputs.version }}"
          echo "  - ${{ steps.tag.outputs.commit }}"

  # ============================================================================
  # JOB 7: DEPLOY TO STAGING (Template)
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, quality, security, docker-build, release]
    if: github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'staging'
    environment:
      name: staging
      url: https://staging-example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_number }}
          path: dist/

      - name: Setup deployment
        run: |
          echo "📦 Preparing Staging Deployment"
          echo "Version: $(node -p "require('./package.json').version")"
          echo "Artifacts size: $(du -sh dist/ | cut -f1)"

      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying to Staging..."
          echo ""
          echo "⚠️  SETUP NEEDED:"
          echo "  1. Add GitHub Secrets:"
          echo "     - STAGING_HOST (server domain/IP)"
          echo "     - STAGING_USER (SSH username)"
          echo "     - STAGING_KEY (SSH private key)"
          echo ""
          echo "  2. Uncomment deployment command below:"
          echo "     scp -r dist/* \${{ secrets.STAGING_USER }}@\${{ secrets.STAGING_HOST }}:/var/www/app/"
          echo ""
          echo "  3. Add post-deploy commands if needed"
          echo "     (npm install, systemctl restart app, etc)"
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
        continue-on-error: true

      - name: Health check
        run: |
          echo "🔍 Health check (template)"
          echo "  curl -f https://staging-example.com/health"
        continue-on-error: true

  # ============================================================================
  # JOB 8: DEPLOY TO PRODUCTION (Template)
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, quality, security, docker-build, release]
    if: github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main'
    environment:
      name: production
      url: https://example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_number }}
          path: dist/

      - name: Setup deployment
        run: |
          echo "🚀 Preparing Production Deployment"
          echo "Version: $(node -p "require('./package.json').version")"
          echo "Commit: ${{ github.sha }}"

      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to Production..."
          echo ""
          echo "⚠️  SETUP NEEDED:"
          echo "  1. Add GitHub Secrets:"
          echo "     - PROD_HOST (production server)"
          echo "     - PROD_USER (SSH username)"
          echo "     - PROD_KEY (SSH private key)"
          echo ""
          echo "  2. Uncomment deployment command:"
          echo "     scp -r dist/* \${{ secrets.PROD_USER }}@\${{ secrets.PROD_HOST }}:/var/www/app/"
          echo ""
          echo "  3. Add verification & rollback strategy"
          echo "     (backup old version, health checks, etc)"
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
        continue-on-error: true

      - name: Production health check
        run: |
          echo "🔍 Production health check (template)"
          echo "  curl -f https://example.com/health"
        continue-on-error: true

  # ============================================================================
  # JOB 9: WORKFLOW SUMMARY
  # ============================================================================
  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [build, quality, security, docker-build, release]
    if: always()
    steps:
      - name: Check results
        run: |
          BUILD_RESULT="${{ needs.build.result }}"
          QUALITY_RESULT="${{ needs.quality.result }}"
          SECURITY_RESULT="${{ needs.security.result }}"
          DOCKER_RESULT="${{ needs.docker-build.result }}"
          
          echo "📊 Workflow Results:"
          echo "  Build: $BUILD_RESULT"
          echo "  Quality: $QUALITY_RESULT"
          echo "  Security: $SECURITY_RESULT"
          echo "  Docker: $DOCKER_RESULT"
          echo ""
          
          if [ "$BUILD_RESULT" = "failure" ]; then
            echo "❌ Build job failed - pipeline stopped"
            exit 1
          fi
          
          echo "✅ CI Pipeline completed successfully!"
          echo ""
          echo "📝 Next steps:"
          echo "  1. Check build logs if needed"
          echo "  2. Review security scan results"
          echo "  3. Docker image pushed to Docker Hub"

# ==============================================================================
# Setup Instructions:
# 
# 1. Docker Hub Secrets (REQUIRED for docker-build job):
#    Settings > Secrets and variables > Actions > New repository secret
#    - DOCKER_USERNAME: Your Docker Hub username (misbahalkhafadh)
#    - DOCKER_PASSWORD: Your Docker Hub access token or password
#
#    To generate Docker Hub token:
#    1. Go to hub.docker.com
#    2. Account Settings > Security > New Access Token
#    3. Generate token & copy to DOCKER_PASSWORD secret
#
# 2. Branch Strategy:
#    - main = production ready → builds tag "latest"
#    - develop = staging/testing → builds tag "develop"
#    - feature branches = no docker build
#
# 3. Branch strategy:
#    - main = production ready
#    - develop = staging/testing
#    - feature branches = untuk development
#
# 4. GitHub Secrets (untuk deployment nanti):
#    Settings > Secrets and variables > Actions > New repository secret
#    - STAGING_HOST: IP atau domain server staging
#    - STAGING_USER: SSH user untuk staging
#    - STAGING_KEY: Private SSH key
#    - PROD_HOST: IP atau domain server production
#    - PROD_USER: SSH user untuk production  
#    - PROD_KEY: Private SSH key
#
# 5. Setup environments:
#    Settings > Environments
#    - staging (auto-deployed dari develop branch)
#    - production (manual approval, hanya dari main)
#
# 6. Image tags di Docker Hub:
#    - misbahalkhafadh/my-react-app:latest (dari main branch)
#    - misbahalkhafadh/my-react-app:develop (dari develop branch)
#    - misbahalkhafadh/my-react-app:vX.Y.Z (dari package.json version)
#    - misbahalkhafadh/my-react-app:COMMIT_SHA (dari git commit)
#
# 7. (Optional) Setup Slack notifications:
#    Uncomment notification section, add SLACK_WEBHOOK secret
# ==============================================================================
