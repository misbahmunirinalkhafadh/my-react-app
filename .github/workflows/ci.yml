# ==============================================================================
# CI/CD Pipeline - React Vite App
# 
# Strategy: Build once, deploy many times
# 
# Branch Flow:
#   develop → CI only (lint, test, build verify) | No Docker | No Deploy
#   staging ← PR from develop | Build Docker | Deploy Staging
#   main ← PR from staging | Reuse Docker + Retag | Semantic Release | Deploy Production
#   hotfix/* → PR to main | Build Docker | Semantic Release Patch | Deploy Production
#
# Docker Strategy:
#   - Staging: tag with commit-sha & 'staging'
#   - Production: pull staging image, retag with version & 'latest'
#   - Hotfix: build new image, tag with version & 'latest'
#
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    types: [closed]
    branches:
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PROJECT_NAME: ${{ github.event.repository.name }}
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}

jobs:
  # ============================================================================
  # JOB 1: SETUP - Get version and commit info
  # ============================================================================
  setup:
    name: Setup & Info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit-sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit SHA
        id: commit
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Display info
        run: |
          echo "📋 Project: ${{ env.PROJECT_NAME }}"
          echo "📌 Commit: ${{ steps.commit.outputs.sha }}"
          echo "📦 Version: ${{ steps.version.outputs.version }}"
          echo "🌳 Branch: ${{ github.ref_name }}"
          echo "🔄 Event: ${{ github.event_name }}"

  # ============================================================================
  # JOB 2: CI - Lint, Test, Build Verify (DEVELOP ONLY)
  # ============================================================================
  ci:
    name: CI - Lint & Build Verify
    runs-on: ubuntu-latest
    needs: setup
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Build verification
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist/ not found"
            exit 1
          fi
          echo "✅ Build verification passed"
          echo "Build size: $(du -sh dist/ | cut -f1)"

  # ============================================================================
  # JOB 3: DOCKER BUILD & PUSH (STAGING ONLY - PR from develop)
  # ============================================================================
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: setup
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'staging'
    outputs:
      image-sha: ${{ steps.meta.outputs.image-sha }}
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare tags
        id: meta
        run: |
          COMMIT_SHA="${{ needs.setup.outputs.commit-sha }}"
          echo "image-sha=${{ env.DOCKER_IMAGE }}:${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "image-tag=${{ env.DOCKER_IMAGE }}:staging" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ needs.setup.outputs.commit-sha }}
            ${{ env.DOCKER_IMAGE }}:staging
          labels: |
            org.opencontainers.image.title=${{ env.PROJECT_NAME }}
            org.opencontainers.image.revision=${{ needs.setup.outputs.commit-sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker build summary
        run: |
          echo "✅ Docker image built successfully"
          echo "📦 Tags:"
          echo "   - ${{ needs.setup.outputs.commit-sha }}"
          echo "   - staging"

  # ============================================================================
  # JOB 4: DEPLOY STAGING (after docker-build)
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [setup, docker-build]
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'staging'
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deployment
        run: |
          echo "🚀 Deploying to Staging"
          echo ""
          echo "Image Details:"
          echo "   Repository: ${{ env.DOCKER_IMAGE }}"
          echo "   Tag: ${{ needs.setup.outputs.commit-sha }}"
          echo "   Full: ${{ needs.docker-build.outputs.image-sha }}"
          echo ""
          echo "Commit: ${{ needs.setup.outputs.commit-sha }}"
          echo ""

      - name: Deploy to Staging
        run: |
          echo "⚠️  Configure your deployment script below"
          echo ""
          echo "Recommended deployment methods:"
          echo "  1. SSH + Docker Compose"
          echo "     scp docker-compose.prod.yml user@staging:/app/"
          echo "     ssh user@staging 'cd /app && docker-compose pull && docker-compose up -d'"
          echo ""
          echo "  2. Kubernetes (if using K8s)"
          echo "     kubectl set image deployment/my-app my-app=${{ needs.docker-build.outputs.image-sha }} -n staging"
          echo ""
          echo "  3. Docker Registry + Portainer/Watchtower"
          echo "     Watchtower will auto-pull and restart containers"
          echo ""
          echo "Environment Variables Available:"
          echo "  - DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}"
          echo "  - DOCKER_TAG=${{ needs.setup.outputs.commit-sha }}"
          echo "  - STAGING_HOST=${{ secrets.STAGING_HOST }}"
          echo "  - STAGING_USER=${{ secrets.STAGING_USER }}"
          continue-on-error: false

      - name: Health check (template)
        run: |
          echo "🔍 Staging health check (configure your health check endpoint)"
          echo "   curl -f https://staging.example.com/health || exit 1"
        continue-on-error: true

  # ============================================================================
  # JOB 5: RETAG DOCKER FOR PRODUCTION (Main from Staging - Reuse Image)
  # ============================================================================
  retag-docker:
    name: Retag Docker Image for Production
    runs-on: ubuntu-latest
    needs: setup
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/') == false &&
      startsWith(github.event.pull_request.head.ref, 'hotfix/') == false
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull staging image and retag
        run: |
          COMMIT_SHA="${{ needs.setup.outputs.commit-sha }}"
          VERSION="v${{ needs.setup.outputs.version }}"
          
          echo "📦 Pulling staging image with commit SHA: ${COMMIT_SHA}"
          docker pull ${{ env.DOCKER_IMAGE }}:${COMMIT_SHA}
          
          echo "🏷️  Retagging for production..."
          docker tag ${{ env.DOCKER_IMAGE }}:${COMMIT_SHA} ${{ env.DOCKER_IMAGE }}:${VERSION}
          docker tag ${{ env.DOCKER_IMAGE }}:${COMMIT_SHA} ${{ env.DOCKER_IMAGE }}:latest
          
          echo "📤 Pushing production tags..."
          docker push ${{ env.DOCKER_IMAGE }}:${VERSION}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Production tags summary
        run: |
          echo "✅ Docker image retagged for production"
          echo "📦 Production Tags:"
          echo "   - v${{ needs.setup.outputs.version }}"
          echo "   - latest"

  # ============================================================================
  # JOB 6: HOTFIX DOCKER BUILD (Main from hotfix/* - Build New Image)
  # ============================================================================
  hotfix-docker-build:
    name: Hotfix - Docker Build & Push
    runs-on: ubuntu-latest
    needs: setup
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'hotfix/')
    outputs:
      image-sha: ${{ steps.meta.outputs.image-sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare tags
        id: meta
        run: |
          COMMIT_SHA="${{ needs.setup.outputs.commit-sha }}"
          VERSION="v${{ needs.setup.outputs.version }}"
          echo "image-sha=${{ env.DOCKER_IMAGE }}:${VERSION}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push hotfix image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:v${{ needs.setup.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=${{ env.PROJECT_NAME }}
            org.opencontainers.image.revision=${{ needs.setup.outputs.commit-sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Hotfix docker summary
        run: |
          echo "✅ Hotfix Docker image built successfully"
          echo "📦 Tags:"
          echo "   - v${{ needs.setup.outputs.version }}"
          echo "   - latest"

  # ============================================================================
  # JOB 7: SEMANTIC RELEASE (MAIN ONLY)
  # ============================================================================
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: setup
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "✅ Semantic release completed"
          echo "📝 Commit type determines version bump:"
          echo "   - feat → minor version"
          echo "   - fix → patch version"
          echo "   - feat! or BREAKING CHANGE → major version"

  # ============================================================================
  # JOB 8: DEPLOY PRODUCTION
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, retag-docker, hotfix-docker-build, semantic-release]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      (needs.retag-docker.result == 'success' || needs.hotfix-docker-build.result == 'success')
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine image source
        id: image
        run: |
          if [ "${{ needs.hotfix-docker-build.result }}" == "success" ]; then
            echo "source=hotfix build"
            echo "tag=v${{ needs.setup.outputs.version }}"
          else
            echo "source=staging image (retagged)"
            echo "tag=v${{ needs.setup.outputs.version }}"
          fi

      - name: Prepare production deployment
        run: |
          echo "🚀 Deploying to Production"
          echo ""
          echo "Image Details:"
          echo "   Repository: ${{ env.DOCKER_IMAGE }}"
          echo "   Tags: v${{ needs.setup.outputs.version }}, latest"
          echo "   Source: ${{ steps.image.outputs.source }}"
          echo ""
          echo "Deployment Info:"
          echo "   Commit: ${{ needs.setup.outputs.commit-sha }}"
          echo "   Version: v${{ needs.setup.outputs.version }}"
          echo "   Environment: Production"
          echo ""

      - name: Deploy to Production
        run: |
          echo "⚠️  Configure your deployment script below"
          echo ""
          echo "Recommended deployment methods:"
          echo "  1. SSH + Docker Compose"
          echo "     scp docker-compose.prod.yml user@prod:/app/"
          echo "     ssh user@prod 'cd /app && docker-compose pull && docker-compose up -d'"
          echo ""
          echo "  2. Kubernetes (if using K8s)"
          echo "     kubectl set image deployment/my-app my-app=${{ env.DOCKER_IMAGE }}:v${{ needs.setup.outputs.version }} -n production"
          echo ""
          echo "  3. Docker Registry + Auto-Deploy"
          echo "     Watchtower or similar service will auto-pull latest tag"
          echo ""
          echo "Environment Variables Available:"
          echo "  - DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}"
          echo "  - DOCKER_TAG=v${{ needs.setup.outputs.version }}"
          echo "  - PROD_HOST=${{ secrets.PROD_HOST }}"
          echo "  - PROD_USER=${{ secrets.PROD_USER }}"
          continue-on-error: false

      - name: Production health check (template)
        run: |
          echo "🔍 Production health check (configure your health check endpoint)"
          echo "   curl -f https://example.com/health || exit 1"
        continue-on-error: true

      - name: Deployment success
        run: |
          echo "✅ Production deployment completed successfully"
          echo ""
          echo "📊 Deployment Summary:"
          echo "   Version: v${{ needs.setup.outputs.version }}"
          echo "   Image: ${{ env.DOCKER_IMAGE }}:v${{ needs.setup.outputs.version }}"
          echo "   Status: 🟢 LIVE"

  # ============================================================================
  # JOB 9: WORKFLOW SUMMARY
  # ============================================================================
  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [setup]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "📊 CI/CD Pipeline Summary"
          echo ""
          echo "Project Information:"
          echo "   Name: ${{ env.PROJECT_NAME }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Commit: ${{ needs.setup.outputs.commit-sha }}"
          echo "   Version: ${{ needs.setup.outputs.version }}"
          echo ""
          echo "Pipeline Details:"
          echo "   Trigger: ${{ github.event_name }}"
          echo "   Actor: ${{ github.actor }}"
          echo ""
          echo "Next Steps:"
          echo "   ✅ Configure deployment secrets for staging & production"
          echo "   ✅ Update deployment scripts in jobs 'deploy-staging' and 'deploy-production'"
          echo "   ✅ Test workflow with develop branch push"


# ==============================================================================
# SETUP INSTRUCTIONS
# ==============================================================================
#
# 1. DOCKER HUB SECRETS (Required)
#    GitHub Settings > Secrets and variables > Actions > New repository secret
#    
#    - DOCKER_USERNAME: Your Docker Hub username
#    - DOCKER_PASSWORD: Docker Hub access token (not password)
#    
#    How to generate Docker Hub token:
#    1. Go to hub.docker.com
#    2. Click Account Settings > Security > New Access Token
#    3. Generate token with read/write permissions
#    4. Copy token to DOCKER_PASSWORD secret
#
# 2. DEPLOYMENT SECRETS (Optional - Required when you enable deployment)
#    
#    For Staging:
#    - STAGING_HOST: Server IP or domain
#    - STAGING_USER: SSH username
#    - STAGING_KEY: SSH private key (PEM format)
#    
#    For Production:
#    - PROD_HOST: Server IP or domain
#    - PROD_USER: SSH username
#    - PROD_KEY: SSH private key (PEM format)
#
# 3. GITHUB ENVIRONMENTS
#    GitHub Settings > Environments
#    
#    Create two environments:
#    - staging (optional approval, auto-deploy from staging branch)
#    - production (requires approval, only from main branch)
#
# 4. BRANCH STRATEGY
#    
#    Main (main)
#    ├── staging (protected, requires PR + approval)
#    │   ├── develop (protected, requires PR)
#    │   └── feature/* (regular branches for development)
#    └── hotfix/* (for production hotfixes)
#    
#    Branch Protection Rules:
#    - develop: Require PR reviews before merge
#    - staging: Require PR reviews + 1 approval before merge
#    - main: Require PR reviews + 2 approvals + status check pass before merge
#
# 5. WORKFLOW FLOW DIAGRAM
#    
#    DEVELOP (push)
#    ├─ setup
#    └─ ci (lint, test, build verify)
#       └─ ✅ Complete, no docker build, no deploy
#    
#    STAGING (PR from develop merged)
#    ├─ setup
#    ├─ docker-build (build & push with tag: commit-sha, staging)
#    └─ deploy-staging (deploy using docker image)
#    
#    MAIN (PR from staging merged)
#    ├─ setup
#    ├─ retag-docker (pull staging image, retag as latest, v*.*.*)
#    ├─ semantic-release (generate changelog, create release tag)
#    └─ deploy-production (deploy using retagged image)
#    
#    HOTFIX (branch hotfix/* -> PR to main merged)
#    ├─ setup
#    ├─ hotfix-docker-build (build new image with v*.*.*)
#    ├─ semantic-release (patch version bump)
#    └─ deploy-production (deploy using new image)
#
# 6. IMAGE TAGGING STRATEGY
#    
#    Staging Build:
#    - misbahalkhafadh/my-react-app:abc123ef (commit SHA)
#    - misbahalkhafadh/my-react-app:staging (latest staging)
#    
#    Production (from staging):
#    - misbahalkhafadh/my-react-app:v1.2.3 (semantic version)
#    - misbahalkhafadh/my-react-app:latest (production latest)
#    
#    Hotfix Production:
#    - misbahalkhafadh/my-react-app:v1.2.4 (patch version)
#    - misbahalkhafadh/my-react-app:latest (production latest)
#
# 7. DEPLOYMENT CONFIGURATION
#    
#    The deployment jobs are templates. Configure them based on your setup:
#    
#    Option A: SSH + Docker Compose
#    - Copy docker-compose file to server
#    - SSH into server and restart containers
#    
#    Option B: Kubernetes
#    - Use kubectl to update deployment image
#    
#    Option C: Container Registry + Auto-Deploy
#    - Use Watchtower or similar to auto-pull and restart
#
# 8. SEMANTIC RELEASE CONFIGURATION
#    
#    Commit message patterns:
#    - "fix: bug fix" → patch version (1.0.0 → 1.0.1)
#    - "feat: new feature" → minor version (1.0.0 → 1.1.0)
#    - "feat!: breaking change" → major version (1.0.0 → 2.0.0)
#    
#    Ensure your package.json version is correct before merging to main.
#    Semantic Release will update it automatically.
#
# 9. TROUBLESHOOTING
#    
#    Docker build fails:
#    - Check Dockerfile syntax
#    - Verify nginx.conf is present
#    - Review build logs in Actions
#    
#    Semantic release fails:
#    - Ensure commit messages follow conventional commits
#    - Check GitHub token has write permissions
#    - Verify package.json exists and is valid
#    
#    Deployment fails:
#    - Verify SSH secrets are configured correctly
#    - Check server connectivity and credentials
#    - Review deployment logs in Actions
#
# 10. ADVANCED: Adding Security Scanning
#    
#    Uncomment security scanning if needed:
#    - npm audit for dependency vulnerabilities
#    - Trivy for container image scanning
#    - CodeQL for code security analysis
#
# ==============================================================================
